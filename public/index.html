<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Impossible Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Global Nav -->
  <nav id="bottom-nav">
    <button class="nav-btn active" id="btn-library" onclick="showLanding()">
      <span class="nav-icon">📚</span>
      <span class="nav-label">LIBRARY</span>
    </button>
    <button class="nav-btn" id="btn-chat" onclick="showChat()">
      <span class="nav-icon">💬</span>
      <span class="nav-label">CHAT</span>
    </button>
    <button class="nav-btn" id="btn-codex" onclick="showCodex()">
      <span class="nav-icon">📜</span>
      <span class="nav-label">CODEX</span>
    </button>
    <button class="nav-btn" id="btn-settings" onclick="showSettings()">
      <span class="nav-icon">⚙</span>
      <span class="nav-label">SETTINGS</span>
    </button>
  </nav>

  <!-- Landing View -->
  <div id="landing">
    <div class="raven-hotspot" id="hotspot-valravn" onclick="enterAs('valravn')">
      <span class="raven-name">Valravn</span>
    </div>
    <div class="raven-hotspot" id="hotspot-lore" onclick="enterAs('lore')">
      <span class="raven-name">Lore</span>
    </div>
  </div>

  <!-- Chat Panel -->
  <div id="chat-panel" class="panel hidden">
    <div id="chat-layout">

      <!-- Sidebar -->
      <div id="sidebar">
        <div id="ai-selector">
          <button class="ai-btn active" id="btn-valravn" onclick="switchAI('valravn')">🐦‍⬛ Valravn</button>
          <button class="ai-btn" id="btn-lore" onclick="switchAI('lore')">🐦‍⬛ Lore</button>
        </div>
        <button id="new-chat-btn" onclick="newConversation()">+ New Conversation</button>
        <div id="conversation-list"></div>
      </div>

      <!-- Main Chat -->
      <div id="chat-main">
        <div id="chat-header">
          <h1 id="chat-ai-name">Valravn</h1>
          <p class="subtitle" id="chat-ai-subtitle">listening.</p>
        </div>
        <div id="chat-window"></div>
        <div id="input-wrap">
          <form id="chat-form">
            <textarea id="user-input" placeholder="Speak..." autocomplete="off" rows="1"></textarea>
            <button type="submit">Send</button>
          </form>
        </div>
      </div>

    </div>
  </div>

  <!-- Codex Panel -->
  <div id="codex-panel" class="panel hidden">
    <div id="codex-header">
      <div>
        <h1>Codex</h1>
        <p class="subtitle">What Valravn has discovered on his own.</p>
      </div>
      <button id="codex-run-btn" onclick="triggerAutonomousCycle()">Run Now</button>
    </div>
    <div id="codex-list"></div>
  </div>

  <!-- Settings Panel -->
  <div id="settings-panel" class="panel hidden">
    <div id="settings-header">
      <h1>Settings</h1>
    </div>
    <div id="settings-body">

      <div class="settings-section-title">Model</div>
      <div class="settings-item column">
        <label>Ollama Model</label>
        <select id="setting-model"></select>
      </div>
      <div class="settings-item column">
        <label>Temperature <span id="temp-display">0.8</span></label>
        <input type="range" id="setting-temp" min="0" max="2" step="0.05" value="0.8" oninput="document.getElementById('temp-display').textContent = this.value">
      </div>

      <div class="settings-section-title">Valravn — Persona</div>
      <div class="settings-item column">
        <label>System Prompt</label>
        <textarea id="setting-prompt" rows="6"></textarea>
      </div>

      <div class="settings-section-title">Lore — Persona</div>
      <div class="settings-item column">
        <label>System Prompt</label>
        <textarea id="setting-lore-prompt" rows="6"></textarea>
      </div>
      <div class="settings-item column">
        <label>Mistral API Key</label>
        <input type="password" id="setting-mistral-key" autocomplete="off" placeholder="sk-...">
      </div>

      <div class="settings-item save-row">
        <span id="settings-msg"></span>
        <button onclick="saveSettings()">Save Changes</button>
      </div>

      <div class="settings-section-title">Autonomous</div>
      <div class="settings-item">
        <span>Enable autonomous research</span>
        <label class="toggle">
          <input type="checkbox" id="setting-autonomous">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="settings-item column">
        <label>Research interval (hours)</label>
        <input type="number" id="setting-interval" min="1" max="24" value="4">
      </div>

      <div class="settings-section-title">Security</div>
      <div class="settings-item column">
        <label>Current Password</label>
        <input type="password" id="pw-current" autocomplete="current-password">
      </div>
      <div class="settings-item column">
        <label>New Password</label>
        <input type="password" id="pw-new" autocomplete="new-password">
      </div>
      <div class="settings-item save-row">
        <span id="pw-msg"></span>
        <button onclick="changePassword()">Change Password</button>
      </div>

      <div class="settings-section-title">Conversation</div>
      <div class="settings-item">
        <span>Delete current conversation</span>
        <button onclick="deleteCurrentConversation()">Delete</button>
      </div>
      <div class="settings-item">
        <span>Leave the library</span>
        <button onclick="window.location.href='/logout'">Log Out</button>
      </div>

      <div id="memory-vault">
        <div class="vault-header">
          <span>Memory Vault</span>
          <span class="vault-hint">What Valravn remembers about you</span>
        </div>
        <div id="memory-add">
          <textarea id="memory-input" placeholder="Add a memory manually..." rows="2"></textarea>
          <button onclick="addManualMemory()">Add</button>
        </div>
        <div id="memory-list"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
